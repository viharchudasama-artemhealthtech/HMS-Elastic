spring.application.name=backend
server.port=8080
spring.profiles.default=mysql



# Standard configuration


# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Production-safe default: validate schema instead of mutating it at startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration (Externalized Secret for Production)
# To overwrite in production, set Environment Variable: JWT_SECRET_KEY
hms.jwt.secret=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
hms.jwt.expirationMs=3600000
hms.jwt.refreshExpirationMs=604800000
hms.jwt.cookieSecure=false
hms.jwt.cookieSameSite=Lax

# CORS Configuration
cors.max-age=3600
cors.allow-credentials=true
cors.debug=false

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.hms=DEBUG

# Direct logs to a persistent file (Production Grade)
logging.file.name=logs/hms-app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=10MB

spring.devtools.restart.enabled=true

# Elasticsearch configuration (local development)
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=
spring.elasticsearch.password=
spring.elasticsearch.socket-timeout=60s
spring.elasticsearch.connection-timeout=5s
